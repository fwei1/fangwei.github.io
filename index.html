<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一年级数学口算闯关</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    <!-- 主页面 -->
    <div id="homePage" class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-blue-600 mb-2">🧮 口算闯关</h1>
        <p class="text-gray-500 mb-8">挑战你的数学能力！</p>
        
        <!-- 难度选择按钮 -->
        <div class="space-y-4 mb-8">
            <button onclick="startGame('easy')" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white text-xl font-bold rounded-2xl transition-all transform hover:scale-105 shadow-lg">
                🌱 简单模式
                <div class="text-sm font-normal opacity-80">60秒 · 20题 · 10→20以内</div>
            </button>
            
            <button onclick="startGame('medium')" class="w-full py-4 bg-yellow-500 hover:bg-yellow-600 text-white text-xl font-bold rounded-2xl transition-all transform hover:scale-105 shadow-lg">
                🌿 中等模式
                <div class="text-sm font-normal opacity-80">75秒 · 20题 · 20→50以内(无进退位)</div>
            </button>
            
            <button onclick="startGame('hard')" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold rounded-2xl transition-all transform hover:scale-105 shadow-lg">
                🌳 困难模式
                <div class="text-sm font-normal opacity-80">90秒 · 20题 · 50→100以内</div>
            </button>
            
            <button onclick="startGame('hell')" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white text-xl font-bold rounded-2xl transition-all transform hover:scale-105 shadow-lg">
                🔥 恶魔模式
                <div class="text-sm font-normal opacity-80">60秒 · 20题 · 全部100以内</div>
            </button>
        </div>
        
        <!-- 自定义模式按钮 -->
        <button onclick="showCustomSettings()" class="w-full py-3 bg-purple-500 hover:bg-purple-600 text-white text-lg font-bold rounded-2xl transition-all transform hover:scale-105 shadow-lg mb-4">
            ⚙️ 自定义模式
            <div class="text-sm font-normal opacity-80">四阶段顺序出题</div>
        </button>
        
        <!-- 历史记录 -->
        <div class="text-gray-400 text-sm">
            最高记录: <span id="bestScore">0</span> 题
        </div>
    </div>

    <!-- 自定义设置页面 -->
    <div id="customSettings" class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full hidden">
        <h2 class="text-3xl font-bold text-purple-600 mb-6 text-center">⚙️ 自定义闯关</h2>
        
        <div class="space-y-6 mb-8">
            <div>
                <label class="block text-gray-700 font-bold mb-2">闯关时间 (秒)</label>
                <input type="number" id="customTime" min="10" max="600" value="120" 
                       class="w-full p-3 border-2 border-purple-200 rounded-xl text-center text-xl focus:border-purple-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">题目数量</label>
                <input type="number" id="customCount" min="10" max="200" value="30" 
                       class="w-full p-3 border-2 border-purple-200 rounded-xl text-center text-xl focus:border-purple-500 focus:outline-none">
            </div>
            
            <div class="bg-purple-50 p-4 rounded-xl">
                <p class="text-purple-700 text-sm">
                    <strong>自定义模式规则：</strong><br>
                    • 第1-5题：10以内加减法<br>
                    • 第6-10题：20以内加减法<br>
                    • 第11题及以后：50以内和100以内随机
                </p>
            </div>
        </div>
        
        <div class="flex gap-4">
            <button onclick="hideCustomSettings()" class="flex-1 py-3 bg-gray-300 hover:bg-gray-400 text-gray-700 font-bold rounded-xl transition-all">
                返回
            </button>
            <button onclick="startCustomGame()" class="flex-1 py-3 bg-purple-500 hover:bg-purple-600 text-white font-bold rounded-xl transition-all">
                开始闯关
            </button>
        </div>
    </div>

    <!-- 游戏页面 -->
    <div id="gamePage" class="bg-white rounded-3xl shadow-2xl p-6 max-w-md w-full hidden">
        <!-- 顶部状态栏 -->
        <div class="flex justify-between items-center mb-4">
            <div class="text-2xl font-bold text-blue-600">
                ⏱️ <span id="timer">60</span>秒
            </div>
            <div class="text-2xl font-bold text-green-600">
                ✅ <span id="score">0</span>/<span id="total">20</span>
            </div>
        </div>
        
        <!-- 进度条 -->
        <div class="w-full bg-gray-200 rounded-full h-4 mb-6 overflow-hidden">
            <div id="progressBar" class="bg-gradient-to-r from-green-400 to-blue-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        
        <!-- 题目区域 -->
        <div class="text-center mb-4">
            <div id="question" class="text-5xl font-bold text-gray-800 mb-4">3 + 5 = ?</div>
            <div id="answerDisplay" class="w-40 h-16 mx-auto text-4xl text-center border-4 border-blue-300 rounded-2xl flex items-center justify-center bg-white">
                ?
            </div>
        </div>
        
        <!-- 数字键盘 -->
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="inputNumber('1')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">1</button>
            <button onclick="inputNumber('2')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">2</button>
            <button onclick="inputNumber('3')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">3</button>
            <button onclick="inputNumber('4')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">4</button>
            <button onclick="inputNumber('5')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">5</button>
            <button onclick="inputNumber('6')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">6</button>
            <button onclick="inputNumber('7')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">7</button>
            <button onclick="inputNumber('8')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">8</button>
            <button onclick="inputNumber('9')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">9</button>
            <button onclick="deleteNumber()" class="py-4 bg-red-100 hover:bg-red-200 text-2xl font-bold rounded-xl transition-all">⌫</button>
            <button onclick="inputNumber('0')" class="py-4 bg-gray-100 hover:bg-gray-200 text-3xl font-bold rounded-xl transition-all">0</button>
            <button onclick="submitAnswer()" class="py-4 bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold rounded-xl transition-all">✓</button>
        </div>
        
        <!-- 返回按钮 -->
        <button onclick="goHome()" class="w-full py-2 bg-gray-200 hover:bg-gray-300 text-gray-600 font-bold rounded-xl transition-all">
            返回主页
        </button>
    </div>

    <!-- 结果页面 -->
    <div id="resultPage" class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center hidden">
        <div id="resultIcon" class="text-8xl mb-4">🎉</div>
        <h2 id="resultTitle" class="text-4xl font-bold mb-4">闯关成功！</h2>
        <p id="resultMessage" class="text-xl text-gray-600 mb-6">太棒了！你完成了所有题目！</p>
        
        <!-- 答题统计 -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <button onclick="showHistory('all')" class="bg-blue-100 hover:bg-blue-200 p-4 rounded-xl transition-all">
                <div class="text-3xl font-bold text-blue-600" id="totalCount">20</div>
                <div class="text-sm text-gray-600">总答题数</div>
            </button>
            <button onclick="showHistory('correct')" class="bg-green-100 hover:bg-green-200 p-4 rounded-xl transition-all">
                <div class="text-3xl font-bold text-green-600" id="correctCount">18</div>
                <div class="text-sm text-gray-600">正确数</div>
            </button>
            <button onclick="showHistory('wrong')" class="bg-red-100 hover:bg-red-200 p-4 rounded-xl transition-all">
                <div class="text-3xl font-bold text-red-600" id="wrongCount">2</div>
                <div class="text-sm text-gray-600">错误数</div>
            </button>
        </div>
        
        <div class="bg-gray-100 rounded-2xl p-4 mb-6">
            <div class="text-gray-500">
                用时 <span id="usedTime">45</span> 秒
            </div>
        </div>
        
        <div class="space-y-4">
            <button onclick="restartGame()" class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold rounded-2xl transition-all transform hover:scale-105 shadow-lg">
                再来一次
            </button>
            <button onclick="goHome()" class="w-full py-3 bg-gray-200 hover:bg-gray-300 text-gray-600 font-bold rounded-xl transition-all">
                返回主页
            </button>
        </div>
    </div>

    <!-- 题目历史弹窗 -->
    <div id="historyModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-3xl shadow-2xl p-6 max-w-md w-full max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 id="historyTitle" class="text-2xl font-bold text-gray-800">全部题目</h3>
                <button onclick="hideHistory()" class="text-3xl text-gray-500 hover:text-gray-700">×</button>
            </div>
            <div id="historyList" class="space-y-2">
                <!-- 题目列表将在这里动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 游戏状态变量
        let currentDifficulty = 'easy';
        let timeLeft = 60;
        let totalQuestions = 20;
        let currentScore = 0;
        let timer;
        let startTime;
        let currentAnswer = 0;
        let phase1Count = 0; // 第一阶段已完成题目数
        let phase1Total = 0; // 第一阶段总题目数
        let gameType = 'easy';
        let userInput = '';
        let lastOperator = ''; // 记录上一次的运算符，确保交替
        let answerHistory = []; // 记录所有答题历史
        let questionNumber = 0; // 当前题目序号（用于自定义模式）

        // 难度配置
        const difficultyConfig = {
            easy: {
                time: 60,
                count: 20,
                phase1Max: 10,
                phase2Max: 20,
                phase1NoCarry: false,
                phase2NoCarry: false,
                borrowRate: 0.5
            },
            medium: {
                time: 75,
                count: 20,
                phase1Max: 20,
                phase2Max: 50,
                phase1NoCarry: false,
                phase2NoCarry: true,
                borrowRate: 0.5
            },
            hard: {
                time: 90,
                count: 20,
                phase1Max: 50,
                phase2Max: 100,
                phase1NoCarry: true,
                phase2NoCarry: false,
                borrowRate: 0.7
            },
            hell: {
                time: 60,
                count: 20,
                phase1Max: 100,
                phase2Max: 100,
                phase1NoCarry: false,
                phase2NoCarry: false,
                borrowRate: 0.7
            }
        };

        // 生成指定范围内的随机数（包含min和max，不包含0）
        function randomInt(min, max) {
            if (min === 0) min = 1;
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // 页面切换函数
        function showPage(pageId) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('customSettings').classList.add('hidden');
            document.getElementById('gamePage').classList.add('hidden');
            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

        // 显示自定义设置
        function showCustomSettings() {
            showPage('customSettings');
        }

        // 隐藏自定义设置
        function hideCustomSettings() {
            showPage('homePage');
        }

        // 开始预设难度游戏
        function startGame(difficulty) {
            currentDifficulty = difficulty;
            const config = difficultyConfig[difficulty];
            timeLeft = config.time;
            totalQuestions = config.count;
            gameType = difficulty;
            phase1Total = Math.floor(totalQuestions / 3);
            phase1Count = 0;
            lastOperator = '';
            answerHistory = [];
            questionNumber = 0;
            startGameLogic();
        }

        // 开始自定义游戏
        function startCustomGame() {
            currentDifficulty = 'custom';
            timeLeft = parseInt(document.getElementById('customTime').value);
            totalQuestions = parseInt(document.getElementById('customCount').value);
            gameType = 'custom';
            lastOperator = '';
            answerHistory = [];
            questionNumber = 0;
            startGameLogic();
        }

        // 游戏核心逻辑
        function startGameLogic() {
            currentScore = 0;
            startTime = Date.now();
            userInput = '';
            
            // 更新UI
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('score').textContent = currentScore;
            document.getElementById('total').textContent = totalQuestions;
            document.getElementById('answerDisplay').textContent = '?';
            updateProgressBar();
            
            // 生成第一题
            generateQuestion();
            
            // 显示游戏页面
            showPage('gamePage');
            
            // 开始计时
            startTimer();
        }

        // 计时器
        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                
                if (timeLeft <= 10) {
                    document.getElementById('timer').classList.add('text-red-500');
                }
                
                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        // 生成题目（最终版：无0题目+自定义四阶段）
        function generateQuestion() {
            questionNumber++;
            let a, b, operator, maxNum;
            let noCarry = false;
            let excludeMax = 0;
            
            // 判断当前模式和阶段
            if (gameType === 'custom') {
                // 自定义模式四阶段顺序
                if (questionNumber <= 5) {
                    maxNum = 10;
                    excludeMax = -1;
                    noCarry = false;
                } else if (questionNumber <= 10) {
                    maxNum = 20;
                    excludeMax = 10;
                    noCarry = false;
                } else {
                    // 第11题及以后：50以内和100以内随机
                    if (Math.random() < 0.5) {
                        maxNum = 50;
                        excludeMax = 20;
                    } else {
                        maxNum = 100;
                        excludeMax = 50;
                    }
                    noCarry = false;
                }
            } else {
                // 预设难度模式
                const config = difficultyConfig[gameType];
                if (phase1Count < phase1Total && gameType !== 'hell') {
                    maxNum = config.phase1Max;
                    noCarry = config.phase1NoCarry;
                    if (maxNum === 10) {
                        excludeMax = -1;
                    } else if (maxNum === 20) {
                        excludeMax = 10;
                    } else if (maxNum === 50) {
                        excludeMax = 20;
                    } else if (maxNum === 100) {
                        excludeMax = 50;
                    }
                } else {
                    maxNum = config.phase2Max;
                    noCarry = config.phase2NoCarry;
                    if (maxNum === 20) {
                        excludeMax = 10;
                    } else if (maxNum === 50) {
                        excludeMax = 20;
                    } else if (maxNum === 100) {
                        excludeMax = 50;
                    }
                }
            }
            
            // 加减法严格交替
            if (lastOperator === '') {
                operator = Math.random() < 0.5 ? '+' : '-';
            } else {
                operator = lastOperator === '+' ? '-' : '+';
            }
            lastOperator = operator;
            
            if (operator === '+') {
                // 加法生成（无0题目）
                if (noCarry) {
                    // 无进位加法
                    do {
                        let tens = Math.floor(maxNum / 10);
                        let aTens = randomInt(0, tens);
                        let bTens = randomInt(0, tens - aTens);
                        let aOnes = randomInt(0, 9);
                        let bOnes = randomInt(0, 9 - aOnes);
                        
                        a = aTens * 10 + aOnes;
                        b = bTens * 10 + bOnes;
                    } while (
                        a === 0 || b === 0 || // 去除含0题目
                        (excludeMax > 0 && a <= excludeMax && b <= excludeMax) ||
                        a + b > maxNum
                    );
                } else {
                    // 普通加法
                    do {
                        a = randomInt(1, maxNum);
                        b = randomInt(1, maxNum - a);
                    } while (excludeMax > 0 && a <= excludeMax && b <= excludeMax);
                }
                currentAnswer = a + b;
            } else {
                // 减法生成（无0题目）
                const borrowRate = gameType === 'hard' || gameType === 'hell' ? 0.7 : 0.5;
                const needBorrow = Math.random() < borrowRate;
                
                if (noCarry) {
                    // 无退位减法
                    do {
                        let tens = Math.floor(maxNum / 10);
                        let aTens = randomInt(0, tens);
                        let bTens = randomInt(0, aTens);
                        let aOnes = randomInt(0, 9);
                        let bOnes = randomInt(0, aOnes);
                        
                        a = aTens * 10 + aOnes;
                        b = bTens * 10 + bOnes;
                    } while (
                        a === 0 || b === 0 || // 去除含0题目
                        (excludeMax > 0 && a <= excludeMax && b <= excludeMax) ||
                        a < b
                    );
                } else if (gameType === 'hard' && needBorrow) {
                    // 困难模式特殊退位规则：几十几减几 或 几十减几，各50%概率
                    if (Math.random() < 0.5) {
                        // 几十几减几（个位不够减）
                        do {
                            let tens = randomInt(Math.floor((excludeMax + 1) / 10), Math.floor(maxNum / 10));
                            let aOnes = randomInt(0, 8); // 个位0-8，确保不够减
                            let b = randomInt(aOnes + 1, 9); // 减数是一位数且比个位大
                            a = tens * 10 + aOnes;
                        } while (a > maxNum || a === 0 || b === 0);
                    } else {
                        // 几十减几
                        do {
                            let tens = randomInt(Math.floor((excludeMax + 1) / 10), Math.floor(maxNum / 10));
                            a = tens * 10; // 个位为0
                            b = randomInt(1, 9); // 减数是一位数
                        } while (a > maxNum || a === 0 || b === 0);
                    }
                } else {
                    // 普通退位/不退位减法
                    if (needBorrow) {
                        // 退位减法
                        do {
                            a = randomInt(excludeMax + 1, maxNum);
                            let aOnes = a % 10;
                            // 确保个位不够减，减数是一位数
                            b = randomInt(aOnes + 1, 9);
                        } while (a < b || a === 0 || b === 0);
                    } else {
                        // 不退位减法
                        do {
                            a = randomInt(excludeMax + 1, maxNum);
                            let aOnes = a % 10;
                            let aTens = Math.floor(a / 10);
                            let bTens = randomInt(0, aTens);
                            let bOnes = randomInt(0, aOnes);
                            b = bTens * 10 + bOnes;
                        } while (b === 0 || a < b || (excludeMax > 0 && b <= excludeMax && a <= excludeMax));
                    }
                }
                currentAnswer = a - b;
            }
            
            // 显示题目
            document.getElementById('question').textContent = `${a} ${operator} ${b} = ?`;
            userInput = '';
            document.getElementById('answerDisplay').textContent = '?';
        }

        // 数字键盘输入
        function inputNumber(num) {
            if (userInput.length < 3) { // 最多输入3位数字
                userInput += num;
                document.getElementById('answerDisplay').textContent = userInput;
            }
        }

        // 删除数字
        function deleteNumber() {
            if (userInput.length > 0) {
                userInput = userInput.slice(0, -1);
                document.getElementById('answerDisplay').textContent = userInput || '?';
            }
        }

        // 提交答案
        function submitAnswer() {
            const userAnswer = parseInt(userInput);
            
            if (isNaN(userAnswer)) {
                return;
            }
            
            // 记录答题历史
            const questionText = document.getElementById('question').textContent.replace(' = ?', '');
            const isCorrect = userAnswer === currentAnswer;
            answerHistory.push({
                question: questionText,
                userAnswer: userAnswer,
                correctAnswer: currentAnswer,
                isCorrect: isCorrect
            });
            
            if (isCorrect) {
                // 答对了
                currentScore++;
                
                // 更新阶段计数（仅预设模式）
                if (gameType !== 'custom' && phase1Count < phase1Total && gameType !== 'hell') {
                    phase1Count++;
                }
                
                // 更新UI
                document.getElementById('score').textContent = currentScore;
                updateProgressBar();
                
                // 检查是否完成
                if (currentScore >= totalQuestions) {
                    endGame(true);
                    return;
                }
                
                // 生成下一题
                generateQuestion();
            } else {
                // 答错了，震动效果
                document.getElementById('answerDisplay').classList.add('animate-pulse', 'border-red-500');
                setTimeout(() => {
                    document.getElementById('answerDisplay').classList.remove('animate-pulse', 'border-red-500');
                    userInput = '';
                    document.getElementById('answerDisplay').textContent = '?';
                }, 300);
            }
        }

        // 更新进度条
        function updateProgressBar() {
            const progress = (currentScore / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        // 结束游戏
        function endGame(success) {
            clearInterval(timer);
            const usedTime = Math.floor((Date.now() - startTime) / 1000);
            
            // 计算统计数据
            const totalCount = answerHistory.length;
            const correctCount = answerHistory.filter(item => item.isCorrect).length;
            const wrongCount = totalCount - correctCount;
            
            // 更新结果页面
            if (success) {
                document.getElementById('resultIcon').textContent = '🎉';
                document.getElementById('resultTitle').textContent = '闯关成功！';
                document.getElementById('resultTitle').className = 'text-4xl font-bold mb-4 text-green-600';
                document.getElementById('resultMessage').textContent = '太棒了！你完成了所有题目！';
                
                // 更新最高记录
                const bestScore = localStorage.getItem('bestScore') || 0;
                if (currentScore > bestScore) {
                    localStorage.setItem('bestScore', currentScore);
                    document.getElementById('bestScore').textContent = currentScore;
                }
            } else {
                document.getElementById('resultIcon').textContent = '😢';
                document.getElementById('resultTitle').textContent = '闯关失败';
                document.getElementById('resultTitle').className = 'text-4xl font-bold mb-4 text-red-600';
                document.getElementById('resultMessage').textContent = '时间到了！再试一次吧！';
            }
            
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('usedTime').textContent = usedTime;
            
            // 显示结果页面
            showPage('resultPage');
        }

        // 显示题目历史
        function showHistory(type) {
            let title, filteredHistory;
            
            if (type === 'all') {
                title = '全部题目';
                filteredHistory = answerHistory;
            } else if (type === 'correct') {
                title = '正确题目';
                filteredHistory = answerHistory.filter(item => item.isCorrect);
            } else {
                title = '错误题目';
                filteredHistory = answerHistory.filter(item => !item.isCorrect);
            }
            
            document.getElementById('historyTitle').textContent = title;
            
            // 生成题目列表
            let html = '';
            filteredHistory.forEach((item, index) => {
                const bgColor = item.isCorrect ? 'bg-green-50' : 'bg-red-50';
                const textColor = item.isCorrect ? 'text-green-600' : 'text-red-600';
                const icon = item.isCorrect ? '✓' : '✗';
                
                html += `
                <div class="${bgColor} p-3 rounded-xl flex justify-between items-center">
                    <div class="text-lg font-bold">${index + 1}. ${item.question} = ${item.correctAnswer}</div>
                    <div class="${textColor} font-bold">
                        ${icon} 你的答案: ${item.userAnswer}
                    </div>
                </div>
                `;
            });
            
            if (filteredHistory.length === 0) {
                html = '<div class="text-center text-gray-500 py-8">暂无记录</div>';
            }
            
            document.getElementById('historyList').innerHTML = html;
            document.getElementById('historyModal').classList.remove('hidden');
        }

        // 隐藏题目历史
        function hideHistory() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        // 重新开始
        function restartGame() {
            if (currentDifficulty === 'custom') {
                startCustomGame();
            } else {
                startGame(currentDifficulty);
            }
        }

        // 返回主页
        function goHome() {
            clearInterval(timer);
            document.getElementById('timer').classList.remove('text-red-500');
            showPage('homePage');
        }

        // 初始化
        window.onload = function() {
            // 加载最高记录
            const bestScore = localStorage.getItem('bestScore') || 0;
            document.getElementById('bestScore').textContent = bestScore;
            
            // 阻止页面滚动
            document.body.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });
            
            // 点击弹窗外部关闭
            document.getElementById('historyModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideHistory();
                }
            });
        };
    </script>
</body>
</html>
